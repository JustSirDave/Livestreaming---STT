<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livestream Speech-to-Text</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.04em; color: #e8e8e8; margin-bottom: 0.35rem; }
    .subtitle { font-size: 0.85rem; color: #6b7280; letter-spacing: 0.02em; }

    /* ── Waveform visualizer — always visible, flat until recording ── */
    #waveform {
      display: block;
      width: 480px;
      max-width: 100%;
      height: 80px;
      margin-bottom: 1.5rem;
      opacity: 0.18;
      transition: opacity 0.4s;
    }
    #waveform.active { opacity: 1; }

    /* ── Transcript wrapper ── */
    .transcript-wrap {
      position: relative;
      width: 100%;
      max-width: 1080px;
    }

    .transcript-actions {
      position: absolute;
      top: 0.6rem;
      right: 0.7rem;
      display: flex;
      gap: 0.4rem;
      z-index: 1;
    }

    .transcript-actions button {
      padding: 0.3rem 0.75rem;
      border: 1px solid #374151;
      border-radius: 5px;
      background: #111;
      color: #9ca3af;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .transcript-actions button:hover { background: #1f2937; color: #e8e8e8; border-color: #4b5563; }
    .transcript-actions button.copied { color: #22c55e; border-color: #22c55e; }

    /* ── Transcript area ── */
    #transcript {
      width: 100%;
      height: 60vh;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
      padding-top: 2.8rem;
      overflow-y: auto;
      line-height: 1.7;
      font-size: 1.05rem;
    }

    #transcript p.final      { color: #e8e8e8; margin-bottom: 0.4rem; }
    #transcript span.interim { color: #6b7280; font-style: italic; }
    #transcript p.log        { color: #374151; font-size: 0.8rem; margin-bottom: 0.5rem; }

    #transcript::-webkit-scrollbar       { width: 6px; }
    #transcript::-webkit-scrollbar-track { background: transparent; }
    #transcript::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* ── Record button ── */
    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 1.2rem;
      align-items: center;
    }

    button { border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: opacity 0.15s, background 0.2s; }
    button:disabled { opacity: 0.35; cursor: default; }

    #btn-record {
      width: 64px;
      height: 64px;
      padding: 0;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }
    #btn-record:hover    { border-color: #6b7280; }
    #btn-record.recording { border-color: #ef4444; background: #1f1010; }

    #btn-mute {
      width: 48px;
      height: 48px;
      padding: 0;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.3;
      pointer-events: none;
      transition: border-color 0.2s, background 0.2s, opacity 0.3s;
    }
    #btn-mute.enabled          { opacity: 1; pointer-events: auto; }
    #btn-mute.enabled:hover    { border-color: #6b7280; }
    #btn-mute.muted            { border-color: #f59e0b; background: #1a1500; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Livestream Speech-to-Text App.</h1>
    <p class="subtitle">Transcribe your speech into text in real time &mdash; English only</p>
  </div>

  <!-- Waveform canvas — appears when recording, driven by mic amplitude -->
  <canvas id="waveform" width="480" height="80"></canvas>

  <div class="transcript-wrap">
    <div class="transcript-actions">
      <button id="btn-copy" title="Copy transcript">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2zm2-1a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H6z"/>
          <path d="M2 5a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1H8v1H2V6h1V5H2z"/>
        </svg>
        Copy
      </button>
      <button id="btn-clear" title="Clear transcript">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
          <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1 0-2h3.5l1-1h3l1 1H14.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z"/>
        </svg>
        Clear
      </button>
    </div>

    <div id="transcript"></div>
  </div>

  <div class="controls">
    <button id="btn-record" title="Start recording">
      <svg id="icon-record" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="8" fill="#ef4444"/>
      </svg>
      <svg id="icon-stop" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <rect x="5" y="5" width="14" height="14" rx="2" fill="#e8e8e8"/>
      </svg>
    </button>

    <!-- Mute / unmute — visible only while recording -->
    <button id="btn-mute" title="Mute microphone">
      <!-- mic-on icon -->
      <svg id="icon-mic" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <line x1="9"  y1="21" x2="15" y2="21"/>
      </svg>
      <!-- mic-off icon (crossed out) -->
      <svg id="icon-mic-off" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <line x1="2" y1="2" x2="22" y2="22"/>
        <path d="M18.9 10a7 7 0 0 1-13.6 2.9M9 9V7a3 3 0 0 1 5.12-2.12"/>
        <rect x="9" y="2" width="6" height="10" rx="3" opacity="0.4"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <line x1="9"  y1="21" x2="15" y2="21"/>
      </svg>
    </button>
  </div>

  <script type="module">
    import { AudioCapture }    from "./audio_capture.js";
    import { WebSocketClient } from "./websocket_client.js";
    import { TranscriptUI }    from "./transcript_ui.js";

    // ── Waveform visualizer ──────────────────────────────────────────────────
    const canvas   = document.getElementById("waveform");
    const wCtx     = canvas.getContext("2d");
    const N_BARS   = 42;

    // Per-bar constants (randomised once)
    const barFreqs  = Array.from({length: N_BARS}, () => 1.5 + Math.random() * 4.0);
    const barPhases = Array.from({length: N_BARS}, () => Math.random() * Math.PI * 2);
    const barSmooth = new Float32Array(N_BARS);

    let waveAmp   = 0;   // updated by onAmplitude
    let waveTime  = 0;
    let waveFrame = null;

    function drawWave() {
      const W = canvas.width;
      const H = canvas.height;
      const slotW = W / N_BARS;
      const barW  = Math.max(2, slotW * 0.36);

      wCtx.clearRect(0, 0, W, H);
      wCtx.fillStyle = "#ffffff";

      waveTime += 0.045;

      for (let i = 0; i < N_BARS; i++) {
        // Independent oscillation per bar scaled by global amplitude
        const osc    = Math.abs(Math.sin(waveTime * barFreqs[i] + barPhases[i]));
        const target = waveAmp * (0.12 + 0.88 * osc);
        barSmooth[i] += (target - barSmooth[i]) * 0.28;

        const barH = Math.max(2, barSmooth[i] * H * 0.94);
        const x    = i * slotW + (slotW - barW) / 2;
        const y    = (H - barH) / 2;

        wCtx.fillRect(Math.round(x), Math.round(y), Math.ceil(barW), Math.ceil(barH));
      }

      waveFrame = requestAnimationFrame(drawWave);
    }

    function startWave() {
      canvas.classList.add("active");
      barSmooth.fill(0);
      waveTime = 0;
      if (!waveFrame) drawWave();
    }

    function stopWave() {
      canvas.classList.remove("active");
      waveAmp = 0;
      // bars decay naturally; stop animation after they settle
      setTimeout(() => {
        if (!waveFrame) return;
        cancelAnimationFrame(waveFrame);
        waveFrame = null;
        wCtx.clearRect(0, 0, canvas.width, canvas.height);
        barSmooth.fill(0);
      }, 600);
    }

    // Draw idle flat line on load
    drawWave();

    // ── App setup ────────────────────────────────────────────────────────────
    const ui = new TranscriptUI();
    const ws = new WebSocketClient((msg) => ui.handle(msg));
    const cap = new AudioCapture(
      (frame)     => ws.sendFrame(frame),
      (amplitude) => { waveAmp = amplitude; }   // drive waveform directly
    );

    const btnRecord   = document.getElementById("btn-record");
    const iconRecord  = document.getElementById("icon-record");
    const iconStop    = document.getElementById("icon-stop");
    const btnMute     = document.getElementById("btn-mute");
    const iconMic     = document.getElementById("icon-mic");
    const iconMicOff  = document.getElementById("icon-mic-off");
    const btnClear    = document.getElementById("btn-clear");
    const btnCopy     = document.getElementById("btn-copy");
    let   recording   = false;

    btnRecord.addEventListener("click", async () => {
      if (!recording) {
        try {
          ws.connect();
          await cap.start();
          recording = true;
          startWave();
          btnRecord.classList.add("recording");
          btnRecord.title          = "Stop recording";
          iconRecord.style.display = "none";
          iconStop.style.display   = "";
          btnMute.classList.add("enabled");
        } catch (err) {
          console.error("Failed to start:", err);
          alert("Microphone access denied or unavailable.");
        }
      } else {
        // Reset mute state before stopping
        if (cap.muted) cap.unmute();
        btnMute.classList.remove("muted", "enabled");
        iconMic.style.display    = "";
        iconMicOff.style.display = "none";
        btnMute.title            = "Mute microphone";

        cap.stop();
        ws.disconnect();
        recording = false;
        stopWave();
        btnRecord.classList.remove("recording");
        btnRecord.title          = "Start recording";
        iconRecord.style.display = "";
        iconStop.style.display   = "none";
      }
    });

    btnMute.addEventListener("click", () => {
      if (!cap.muted) {
        cap.mute();
        waveAmp = 0;
        btnMute.classList.add("muted");
        btnMute.title            = "Unmute microphone";
        iconMic.style.display    = "none";
        iconMicOff.style.display = "";
      } else {
        cap.unmute();
        btnMute.classList.remove("muted");
        btnMute.title            = "Mute microphone";
        iconMic.style.display    = "";
        iconMicOff.style.display = "none";
      }
    });

    // Resume AudioContext when tab becomes visible again (browser may have suspended it)
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) cap.resumeIfSuspended();
    });

    btnClear.addEventListener("click", () => ui.clear());

    btnCopy.addEventListener("click", () => {
      const text = document.getElementById("transcript").innerText.trim();
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        btnCopy.classList.add("copied");
        btnCopy.childNodes[1].textContent = " Copied!";
        setTimeout(() => {
          btnCopy.classList.remove("copied");
          btnCopy.childNodes[1].textContent = " Copy";
        }, 2000);
      });
    });
  </script>

</body>
</html>
